<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rhythm Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 12px;
  }
 
  /* ── SONG SELECT ── */
  #selectScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 340px;
  }
  #selectScreen h1 { font-size: 22px; letter-spacing: 3px; color: #fff; }
  #selectScreen p  { font-size: 12px; color: #555; text-align: center; line-height: 1.6; }
 
  .drop-zone {
    width: 100%;
    border: 1px dashed #444;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    color: #666;
    font-size: 13px;
    line-height: 1.8;
    transition: border-color 0.2s;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #fff; color: #fff; }
 
  #songList {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .song-card {
    border: 1px solid #2a2a2a;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .song-card:hover { border-color: #fff; }
  .song-card .title { font-size: 14px; color: #fff; }
  .song-card .meta  { font-size: 11px; color: #555; margin-top: 3px; }
  .song-card .diff  { font-size: 11px; color: #3498db; margin-top: 2px; }
 
  /* ── GAME ── */
  #gameScreen { display: none; flex-direction: column; align-items: center; gap: 12px; }
 
  #ui { display: flex; gap: 32px; font-size: 14px; color: #aaa; }
  #ui span { color: #fff; font-size: 18px; font-weight: bold; }
 
  canvas { border: 1px solid #333; display: block; }
 
  #feedback {
    font-size: 22px;
    font-weight: bold;
    height: 30px;
    letter-spacing: 2px;
  }
  #keys { display: flex; gap: 8px; font-size: 12px; color: #555; }
  .key-label { width: 60px; text-align: center; }
 
  button {
    padding: 10px 32px;
    background: transparent;
    border: 1px solid #555;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  button:hover { border-color: #fff; }
  #backBtn { font-size: 12px; padding: 6px 16px; color: #555; border-color: #333; }
  #backBtn:hover { color: #fff; border-color: #fff; }
</style>
</head>
<body>
 
<!-- SONG SELECT SCREEN -->
<div id="selectScreen">
  <h1>RHYTHM GAME</h1>
  <p>Load an .osz or .osu file from your computer.<br>Download 4K beatmaps from osu.ppy.sh</p>
 
  <div class="drop-zone" id="dropZone">
    Drop .osz / .osu file here<br>or click to browse
    <input type="file" id="fileInput" accept=".osz,.osu,.zip" style="display:none">
  </div>
 
  <div id="songList"></div>
</div>
 
<!-- GAME SCREEN -->
<div id="gameScreen">
  <div style="display:flex; align-items:center; gap:16px;">
    <button id="backBtn">← BACK</button>
    <div id="songTitle" style="font-size:13px; color:#666;"></div>
  </div>
 
  <div id="ui">
    <div>SCORE <span id="scoreDisplay">0</span></div>
    <div>COMBO <span id="comboDisplay">0</span></div>
  </div>
 
  <canvas id="gameCanvas" width="300" height="500"></canvas>
 
  <div id="feedback"></div>
 
  <div id="keys">
    <div class="key-label">D</div>
    <div class="key-label">F</div>
    <div class="key-label">J</div>
    <div class="key-label">K</div>
  </div>
 
  <button id="restartBtn" style="display:none;">RETRY</button>
</div>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const LANES = 4;
const NOTE_SPEED = 300;
const HIT_WINDOW = 0.15;
const HIT_ZONE_Y = 440;
const LANE_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'];
const KEY_MAP = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
 
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const CW     = canvas.width;
const LW     = CW / LANES;
 
// ─── STATE ────────────────────────────────────────────────────────────────────
let loadedBeatmaps = [];
let audioCtx = null;
let audioSource = null;
let startTime = null;
let notes = [];
let score = 0, combo = 0;
let running = false;
let laneFlash = [0,0,0,0];
let feedbackTimer = null;
let lastTs = null;
let currentBeatmapIndex = -1;
 
// ─── FILE LOADING ─────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
 
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));
 
async function handleFiles(files) {
  for (const file of files) {
    if (file.name.endsWith('.osu')) {
      await loadOsuFile(file, null);
    } else if (file.name.endsWith('.osz') || file.name.endsWith('.zip')) {
      await loadOszFile(file);
    }
  }
  renderSongList();
}
 
async function loadOszFile(file) {
  const zip = await JSZip.loadAsync(file);
 
  // Find and decode the audio file
  let audioBuffer = null;
  const audioExts = ['.mp3', '.ogg', '.wav'];
  for (const name of Object.keys(zip.files)) {
    if (audioExts.some(ext => name.toLowerCase().endsWith(ext))) {
      const arrayBuf = await zip.files[name].async('arraybuffer');
      try {
        const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioBuffer = await tempCtx.decodeAudioData(arrayBuf);
        await tempCtx.close();
      } catch(e) { console.warn('Could not decode audio:', name); }
      break;
    }
  }
 
  // Parse all .osu files inside the archive
  for (const name of Object.keys(zip.files)) {
    if (name.endsWith('.osu')) {
      const text = await zip.files[name].async('string');
      loadOsuText(text, audioBuffer);
    }
  }
}
 
async function loadOsuFile(file, audioBuffer) {
  const text = await file.text();
  loadOsuText(text, audioBuffer);
}
 
// ─── .OSU PARSER ──────────────────────────────────────────────────────────────
function loadOsuText(text, audioBuffer) {
  const lines = text.split('\n').map(l => l.trim());
 
  // Only handle osu!mania (Mode: 3)
  const modeLine = lines.find(l => l.startsWith('Mode:'));
  if (!modeLine || modeLine.split(':')[1].trim() !== '3') return;
 
  // Metadata helpers
  const get = key => {
    const l = lines.find(l => l.startsWith(key + ':'));
    return l ? l.slice(key.length + 1).trim() : '';
  };
 
  const title      = get('Title') || 'Unknown Title';
  const artist     = get('Artist') || 'Unknown Artist';
  const difficulty = get('Version') || 'Unknown';
  const numLanes   = parseInt(get('CircleSize')) || 4;
 
  if (numLanes !== 4) {
    alert(`"${title} [${difficulty}]" is a ${numLanes}K map — only 4K is supported right now.`);
    return;
  }
 
  // Parse [HitObjects]
  const hitIdx = lines.indexOf('[HitObjects]');
  if (hitIdx === -1) return;
 
  const parsedNotes = [];
  for (let i = hitIdx + 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line || line.startsWith('[')) break;
    const parts = line.split(',');
    if (parts.length < 3) continue;
 
    const x    = parseInt(parts[0]);
    const time = parseInt(parts[2]) / 1000; // ms → seconds
    const lane = Math.min(3, Math.floor(x * 4 / 512));
    parsedNotes.push({ time, lane, hit: false, missed: false });
  }
 
  parsedNotes.sort((a, b) => a.time - b.time);
  loadedBeatmaps.push({ title, artist, difficulty, notes: parsedNotes, audioBuffer });
}
 
// ─── SONG SELECT UI ───────────────────────────────────────────────────────────
function renderSongList() {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  if (loadedBeatmaps.length === 0) return;
 
  loadedBeatmaps.forEach((bm, i) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <div class="title">${bm.title}</div>
      <div class="meta">${bm.artist} &middot; ${bm.notes.length} notes</div>
      <div class="diff">${bm.difficulty}</div>
    `;
    card.addEventListener('click', () => startGame(i));
    list.appendChild(card);
  });
}
 
// ─── START GAME ───────────────────────────────────────────────────────────────
function startGame(idx) {
  currentBeatmapIndex = idx;
  const bm = loadedBeatmaps[idx];
  notes = bm.notes.map(n => ({ ...n, hit: false, missed: false }));
  score = 0; combo = 0; laneFlash = [0,0,0,0]; lastTs = null;
 
  document.getElementById('selectScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('songTitle').textContent = `${bm.title} [${bm.difficulty}]`;
  updateUI();
 
  if (audioCtx) { try { audioCtx.close(); } catch(e){} }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 
  const delay = 0.1;
 
  if (bm.audioBuffer) {
    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = bm.audioBuffer;
    audioSource.connect(audioCtx.destination);
    audioSource.start(audioCtx.currentTime + delay);
  }
 
  startTime = audioCtx.currentTime + delay;
  running = true;
  requestAnimationFrame(loop);
}
 
document.getElementById('backBtn').addEventListener('click', () => {
  running = false;
  if (audioSource) { try { audioSource.stop(); } catch(e){} }
  if (audioCtx)    { try { audioCtx.close();  } catch(e){} }
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('selectScreen').style.display = 'flex';
  drawBlankCanvas();
});
 
document.getElementById('restartBtn').addEventListener('click', () => {
  if (currentBeatmapIndex !== -1) startGame(currentBeatmapIndex);
});
 
// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!running) return;
  const dt = lastTs ? (ts - lastTs) / 1000 : 0;
  lastTs = ts;
  const t = songTime();
 
  notes.forEach(n => {
    if (!n.hit && !n.missed && t > n.time + HIT_WINDOW) {
      n.missed = true;
      combo = 0;
      showFeedback('MISS', '#e74c3c');
      updateUI();
    }
  });
 
  laneFlash = laneFlash.map(v => Math.max(0, v - dt * 4));
  draw(t);
 
  const allDone = notes.every(n => n.hit || n.missed);
  if (allDone && notes.length > 0 && t > notes[notes.length - 1].time + 1) {
    running = false;
    drawEndScreen();
    return;
  }
  requestAnimationFrame(loop);
}
 
function songTime() {
  if (!audioCtx || startTime === null) return 0;
  return audioCtx.currentTime - startTime;
}
 
// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawBase() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, CW, canvas.height);
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  for (let i = 1; i < LANES; i++) {
    ctx.beginPath(); ctx.moveTo(i*LW, 0); ctx.lineTo(i*LW, canvas.height); ctx.stroke();
  }
  ctx.fillStyle = '#333';
  ctx.fillRect(0, HIT_ZONE_Y, CW, 3);
  LANE_COLORS.forEach((c, i) => {
    ctx.strokeStyle = c; ctx.lineWidth = 2;
    ctx.strokeRect(i*LW+4, HIT_ZONE_Y-18, LW-8, 20);
  });
}
 
function draw(t) {
  drawBase();
 
  laneFlash.forEach((a, i) => {
    if (a > 0) {
      ctx.fillStyle = `rgba(255,255,255,${a * 0.08})`;
      ctx.fillRect(i*LW, 0, LW, canvas.height);
    }
  });
 
  notes.forEach(n => {
    if (n.hit || n.missed) return;
    const y = HIT_ZONE_Y + (t - n.time) * NOTE_SPEED;
    if (y < -20 || y > canvas.height + 20) return;
    ctx.fillStyle = LANE_COLORS[n.lane];
    ctx.beginPath(); ctx.roundRect(n.lane*LW+4, y-14, LW-8, 14, 4); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.roundRect(n.lane*LW+4, y-14, LW-8, 5, [4,4,0,0]); ctx.fill();
  });
}
 
function drawEndScreen() {
  const hits   = notes.filter(n => n.hit).length;
  const misses = notes.filter(n => n.missed).length;
  const pct    = notes.length ? Math.round(hits / notes.length * 100) : 0;
 
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, CW, canvas.height);
  ctx.textAlign = 'center';
 
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('CLEAR!', CW/2, 180);
 
  ctx.font = '15px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`SCORE: ${score}`, CW/2, 220);
  ctx.fillText(`${pct}% accuracy`, CW/2, 245);
  ctx.fillText(`${hits} hits  /  ${misses} misses`, CW/2, 270);
 
  document.getElementById('restartBtn').style.display = 'inline-block';
}
 
function drawBlankCanvas() {
  drawBase();
}
 
// ─── HIT DETECTION ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!running) return;
  const key = e.key.toLowerCase();
  if (!(key in KEY_MAP)) return;
  const lane = KEY_MAP[key];
  laneFlash[lane] = 1;
 
  const t = songTime();
  let best = null, bestDelta = Infinity;
  notes.forEach(n => {
    if (n.hit || n.missed || n.lane !== lane) return;
    const d = Math.abs(t - n.time);
    if (d <= HIT_WINDOW && d < bestDelta) { best = n; bestDelta = d; }
  });
 
  if (best) {
    best.hit = true; combo++;
    if (bestDelta < 0.05)      { score += 300*combo; showFeedback('PERFECT', '#f1c40f'); }
    else if (bestDelta < 0.10) { score += 100*combo; showFeedback('GREAT',   '#2ecc71'); }
    else                       { score += 50*combo;  showFeedback('GOOD',    '#3498db'); }
    updateUI();
  }
});
 
// ─── HELPERS ──────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('comboDisplay').textContent = combo;
}
 
function showFeedback(text, color) {
  const el = document.getElementById('feedback');
  el.textContent = text; el.style.color = color;
  clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => { el.textContent = ''; }, 500);
}
 
drawBlankCanvas();
</script>
</body>
</html>
